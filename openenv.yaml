name: resume-screening-openenv
version: "1.0.0"
description: "An OpenEnv-compliant environment where an AI agent performs resume screening against job descriptions and makes hiring decisions (accept, reject, or shortlist)."
license: MIT

environment:
  type: episodic
  max_steps: 1

action_space:
  type: object
  properties:
    decision:
      type: string
      enum:
        - accept
        - reject
        - shortlist
    reasoning:
      type: string

observation_space:
  type: object
  properties:
    task_id:
      type: string
    difficulty:
      type: string
    job_description:
      type: string
    resume:
      type: string
    history:
      type: array
    step_count:
      type: integer

reward:
  type: float
  min: 0.0
  max: 1.0

tasks:
  - id: task_easy
    difficulty: easy
    description: "Clear strong candidate — correct answer is accept"
    expected_decision: accept

  - id: task_medium
    difficulty: medium
    description: "Underqualified candidate — correct answer is reject"
    expected_decision: reject

  - id: task_hard
    difficulty: hard
    description: "Partial match candidate — correct answer is shortlist"
    expected_decision: shortlist

api:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state

runtime:
  port: 7860
